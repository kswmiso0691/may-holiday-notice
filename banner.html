<script>
var SCALE = 6; // 6배 고화질 (600x360px)
document.querySelectorAll('svg').forEach(function(svg, i) {
  svg.addEventListener('click', function() {
    var canvas = document.createElement('canvas');
    canvas.width = 200 * SCALE;
    canvas.height = 120 * SCALE;
    var ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    var clone = svg.cloneNode(true);
    clone.setAttribute('width', 200 * SCALE);
    clone.setAttribute('height', 120 * SCALE);
    var data = new XMLSerializer().serializeToString(clone);
    var img = new Image();
    img.onload = function() {
      ctx.drawImage(img, 0, 0, 200 * SCALE, 120 * SCALE);
      var a = document.createElement('a');
      var names = ['banner_5월1일_HD','banner_5월5일_HD','banner_5월25일_HD','banner_5월_통합_HD','banner_벚꽃_HD'];
      a.download = names[i] + '.png';
      a.href = canvas.toDataURL('image/png', 1.0);
      a.click();
    };
    img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(data)));
  });
});
</script>
